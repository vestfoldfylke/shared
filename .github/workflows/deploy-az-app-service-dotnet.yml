name: Deploy azure function (dotnet)
on:
  workflow_call:
    inputs:
      azure_appname:
        required: true
        type: string
      azure_functionapp_package_path:
        required: true
        type: string
      dotnet_version:
        required: false
        type: string
        default: "10.0.x"
    secrets:
      azure_publishprofile:
        required: true

jobs:
  build-and-deploy:
    runs-on: self-hosted
    steps:
      - name: "Checkout GitHub Action"
        uses: actions/checkout@v6

      - name: Setup DotNet ${{ inputs.dotnet_version }} Environment
        uses: actions/setup-dotnet@v1
        with:
          dotnet-version: ${{ inputs.dotnet_version }}

      - name: 'Test Project'
        run: dotnet test --configuration Release

      - name: 'Resolve Project Dependencies Using Dotnet'
        shell: bash
        run: |
          pushd './${{ inputs.azure_functionapp_package_path }}'
          dotnet build --configuration Release --output ./output
          popd

      - name: 'Run Azure Functions Action'
        uses: Azure/functions-action@v1
        id: fa
        with:
          app-name: ${{ inputs.azure_appname }}
          slot-name: 'Production'
          package: '${{ inputs.azure_functionapp_package_path }}/output'
          publish-profile: ${{ secrets.azure_publishprofile }}
